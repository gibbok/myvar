{{ define "main" }}
<h1>Sitemap</h1>

<h2>Content</h2>
<ul>
  {{- range .Site.RegularPages }}
  <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
  {{- end }}
</ul>

<h2>Tags</h2>
<ul>
  {{- range .Site.Taxonomies.tags }}
  <li><a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a></li>
  {{- end }}
</ul>
{{ end }}
