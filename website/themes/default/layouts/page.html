{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ $dateMachine := .Date | time.Format "2006-01-02T15:04:05-07:00" }} {{
$dateHuman := .Date | time.Format ":date_long" }}
<div class="page_time">
  <img src="{{ site.BaseURL | strings.TrimSuffix "/" }}/icons/calendar-days.svg"
  alt="calendar icon" height="24" width="24" /><time
    class="page_time"
    datetime="{{ $dateMachine }}"
    >{{ $dateHuman }}</time
  >
</div>

{{ .Content }} {{ partial "terms.html" (dict "taxonomy" "tags" "page" .) }} {{
end }}
