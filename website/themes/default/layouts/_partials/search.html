<div id="search-modal" class="search-modal" style="display: none;">
  <div class="search-modal__backdrop"></div>
  <div class="search-modal__content">
    <div class="search-modal__header">
      <h2>Search</h2>
      <button class="search-modal__close">&times;</button>
    </div>
    <div id="search"></div>
  </div>
</div>

{{ if fileExists "static/pagefind/pagefind-ui.js" }}
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>
{{ else }}
<script src="https://unpkg.com/pagefind@latest/pagefind-ui.js"></script>
<link href="https://unpkg.com/pagefind@latest/pagefind-ui.css" rel="stylesheet">
{{ end }}
<script>
  let searchUI;
  
  window.addEventListener('DOMContentLoaded', (event) => {
    const modal = document.getElementById('search-modal');
    const closeBtn = document.querySelector('.search-modal__close');
    const backdrop = document.querySelector('.search-modal__backdrop');
    const searchLink = document.querySelector('a[href="#"]');
    
    // Initialize Pagefind UI
    searchUI = new PagefindUI({ 
      element: "#search", 
      showSubResults: true,
      resetStyles: false
    });
    
    // Open modal
    if (searchLink) {
      searchLink.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        // Focus search input immediately
        const searchInput = document.querySelector('#search input');
        if (searchInput) {
          searchInput.focus();
        }
      });
    }
    
    // Close modal
    function closeModal() {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    }
    
    closeBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);
    
    // Close modal when clicking search results
    document.addEventListener('click', (e) => {
      if (e.target.closest('.pagefind-ui__result-link') && modal.style.display === 'flex') {
        closeModal();
      }
    });
    
    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.style.display === 'flex') {
        closeModal();
      }
    });
  });
</script>
