{{ define "main" }}
  {{ .Content }}
  {{ $paginator := .Paginate (where site.RegularPages "Type" "!=" "sitemap") }}
  {{ range $paginator.Pages }}
    <section>
      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ .Description }}
    </section>
  {{ end }}
  {{ partial "pagination.html" . }}
{{ end }}
