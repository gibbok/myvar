<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 60px;
            width: 1200px;
            height: 630px;
            background: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .title {
            color: black;
            font-size: 64px;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="title" id="title"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'MyVar.dev';
        document.getElementById('title').textContent = title;
    </script>
</body>
</html>
